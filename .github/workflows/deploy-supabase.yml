# Deploy Supabase — applies database migrations and deploys Edge Functions
# when relevant files are pushed to main.
#
# Required GitHub repository secrets:
#   SUPABASE_ACCESS_TOKEN  — Personal access token from app.supabase.com/account/tokens
#   SUPABASE_PROJECT_ID    — Project ref from Supabase Dashboard → Settings → General
#
# No database password is needed: supabase db push uses the Management API
# (authenticated via SUPABASE_ACCESS_TOKEN), not a direct database connection.
#
# To configure secrets: GitHub repo → Settings → Secrets and variables → Actions → New repository secret

name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"

# Minimum required permissions — read-only repo access is sufficient
permissions:
  contents: read

jobs:
  # ── 1. Apply database migrations ────────────────────────────────────────────
  # Runs first so Edge Functions can rely on any new schema changes.
  # supabase db push is idempotent — it is safe to run even when no new
  # migrations exist.
  migrate:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to remote
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

  # ── 2. Deploy all Edge Functions ────────────────────────────────────────────
  # Runs after migrations so functions can reference new schema.
  # Deploys every function in supabase/functions/ in one pass.
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
